<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Support API</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { font-size: 1.4rem; margin-bottom: 6px; }
    p { color: #666; font-size: 0.95rem; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      text-align: left;
    }
    .btn:hover { background: #333; }
    .btn span { font-size: 0.8rem; color: #aaa; display: block; margin-top: 2px; }
    #result {
      margin-top: 24px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre;
      display: none;
    }
  </style>
</head>
<body>
  <h1>EV Support API</h1>
  <p>Conversational triage for EV charging issues.</p>

  <button class="btn" onclick="checkHealth()">
    Check health
    <span>GET /health</span>
  </button>

  <button class="btn" onclick="triagePayment()">
    Triage: RFID card refused
    <span>POST /triage</span>
  </button>

  <button class="btn" onclick="triageConnector()">
    Triage: connector stuck
    <span>POST /triage</span>
  </button>

  <div id="result"></div>

  <script>
    function show(data) {
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.textContent = JSON.stringify(data, null, 2);
    }

    async function checkHealth() {
      const res = await fetch('/health');
      show(await res.json());
    }

    async function triagePayment() {
      const res = await fetch('/triage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ issue: 'my RFID card keeps getting refused', station_id: 'EV-042' })
      });
      show(await res.json());
    }

    async function triageConnector() {
      const res = await fetch('/triage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ issue: 'connector is stuck and won\'t release', station_id: 'EV-007' })
      });
      show(await res.json());
    }
  </script>
</body>
</html>
