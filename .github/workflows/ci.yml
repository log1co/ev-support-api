name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: 'Promote current :pre image to :rc and deploy to prod'
        required: true
        type: boolean
        default: false

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: ev-support-api

jobs:
  # ── Stage 1: Lint & Test ──────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  # ── Stage 2: Security Scanning ───────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  # ── Stage 3: Build & Push to ECR (on main push only) ─────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-sha-tag: ${{ steps.build.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Amazon ECR Public
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG $ECR_REGISTRY/$ECR_REPOSITORY:pre
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:pre
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT

  # ── Stage 4: Deploy :pre to Staging ──────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Render staging deploy
        run: curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"

  # ── Stage 5: Promote :pre to :rc and deploy to Prod ──────────────
  promote-to-prod:
    name: Promote to Prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.promote_to_prod == true
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag :pre as :rc in ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=pre \
            --query 'images[0].imageManifest' \
            --output text)
          aws ecr put-image \
            --repository-name $ECR_REPOSITORY \
            --image-tag rc \
            --image-manifest "$MANIFEST"
          echo "Successfully promoted :pre to :rc"

      - name: Trigger Render prod deploy
        run: curl -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"